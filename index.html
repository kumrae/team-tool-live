<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>팀 툴 예약</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --line: #d9dfeb;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --danger: #dc2626;
      --disabled-text: #9ca3af;
      --mine: #eff6ff;
      --busy: #f3f4f6;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px;
    }

    .header { margin-bottom: 16px; }
    .title { font-size: 28px; font-weight: 700; margin: 0 0 8px; }
    .desc { color: var(--muted); margin: 0; }

    .grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
      align-items: start;
    }

    .panel {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .panel-inner { padding: 18px; }
    .section-title { font-size: 18px; font-weight: 700; margin: 0 0 14px; }
    .field { margin-bottom: 14px; }
    .label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 8px; }

    select, input[type="date"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      font-size: 14px;
      background: #fff;
    }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .tool-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 12px;
      padding: 10px 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.15s ease;
      min-height: 44px;
    }

    .tool-btn:hover {
      border-color: var(--primary);
      background: #f8fbff;
    }

    .tool-btn.selected {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .tool-btn.mine {
      background: var(--mine);
      border-color: #93c5fd;
      color: #1d4ed8;
    }

    .tool-btn.busy {
      background: var(--busy);
      color: var(--disabled-text);
      border-color: #d1d5db;
      cursor: not-allowed;
    }

    .summary {
      border: 1px dashed var(--line);
      background: #fafcff;
      border-radius: 14px;
      padding: 14px;
      margin-top: 14px;
    }

    .summary-line {
      font-size: 14px;
      margin: 6px 0;
      color: var(--muted);
    }

    .summary-tools {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      background: #eef2ff;
      color: #3730a3;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .btn {
      flex: 1;
      min-height: 46px;
      border: 0;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary { background: var(--primary); color: white; }
    .btn-secondary { background: #eef2f7; color: #374151; }
    .btn-danger { background: var(--danger); color: white; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .board-wrap { display: grid; gap: 20px; }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      display: inline-block;
    }

    .dot-mine { background: var(--primary); }
    .dot-busy { background: #9ca3af; }
    .dot-free { background: #e5e7eb; }

    .board { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    th, td {
      border-bottom: 1px solid #edf2f7;
      padding: 10px 8px;
      text-align: left;
      vertical-align: top;
      font-size: 13px;
    }

    th {
      background: #f8fafc;
      color: #475569;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .member-name {
      white-space: nowrap;
      font-weight: 700;
    }

    .tool-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tool-tag {
      font-size: 12px;
      border-radius: 999px;
      padding: 5px 8px;
      background: #f3f4f6;
      color: #374151;
    }

    .tool-tag.mine {
      background: var(--primary);
      color: #fff;
    }

    .tool-tag.busy {
      background: #e5e7eb;
      color: #6b7280;
    }

    .empty { color: #9ca3af; }

    .log-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .log-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fcfdff;
    }

    .log-top {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .log-name { font-weight: 700; }
    .log-time { font-size: 12px; color: var(--muted); }
    .log-meta { font-size: 13px; color: var(--muted); line-height: 1.5; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(20px);
      background: rgba(17, 24, 39, 0.95);
      color: #fff;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: 0.25s ease;
      z-index: 9999;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .wrap { padding: 14px; }
      .tools-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .actions { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1 class="title">팀 툴 예약</h1>
      <p class="desc">기간을 선택하고 툴을 예약하세요. 이미 예약된 툴은 회색으로 표시됩니다.</p>
    </div>

    <div class="grid">
      <section class="panel">
        <div class="panel-inner">
          <h2 class="section-title">예약 입력</h2>

          <div class="field">
            <label class="label" for="nameSelect">이름</label>
            <select id="nameSelect"></select>
          </div>

          <div class="field">
            <label class="label" for="startDate">시작일</label>
            <input id="startDate" type="date" />
          </div>

          <div class="field">
            <label class="label" for="endDate">종료일</label>
            <input id="endDate" type="date" />
          </div>

          <div class="field">
            <label class="label">툴 선택</label>
            <div id="toolsGrid" class="tools-grid"></div>
          </div>

          <div class="summary">
            <div class="summary-line" id="summaryName">선택자: -</div>
            <div class="summary-line" id="summaryRange">기간: -</div>
            <div class="summary-line">선택 툴</div>
            <div id="summaryTools" class="summary-tools">
              <span class="empty">선택된 툴 없음</span>
            </div>
          </div>

          <div class="actions">
            <button id="reserveBtn" class="btn btn-primary">예약 저장</button>
            <button id="cancelRangeBtn" class="btn btn-secondary">해당 기간 취소</button>
            <button id="cancelAllBtn" class="btn btn-danger">전체 취소</button>
          </div>
        </div>
      </section>

      <div class="board-wrap">
        <section class="panel">
          <div class="panel-inner">
            <h2 class="section-title">오늘 사용 현황</h2>
            <div class="legend">
              <span class="legend-item"><span class="dot dot-mine"></span>내 예약</span>
              <span class="legend-item"><span class="dot dot-busy"></span>다른 사람 예약</span>
              <span class="legend-item"><span class="dot dot-free"></span>비어 있음</span>
            </div>
            <div class="board">
              <table>
                <thead>
                  <tr>
                    <th style="width: 140px;">이름</th>
                    <th>예약 툴</th>
                  </tr>
                </thead>
                <tbody id="boardBody"></tbody>
              </table>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-inner">
            <h2 class="section-title">예약 로그</h2>
            <div id="logList" class="log-list"></div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwN1hhHSNrsipPXGMufLAzZB0uIL1ADpIABnQ4GttmxTuqreRB590_D-c1mSXGKfAcc-w/exec';

    const MEMBERS = [
      '정철환', '정수철', '최금래', '오현석', '정태석', '엄병준', '이진한', '박진만', '김성진', '이준명',
      '홍승한', '조원주', '이윤모', '김윤성', '이태일', '서인석', '이재룡', '전대수', '장원석', '장승혁',
      '박수환', '최상원', '🔧 수리/교정중', '⚠️ 점검필요'
    ];

    const TOOLS = ['S1','S2','S3','S4','SV1','SV2','SV3','SV4','96MPH','N1구형','N2','N3','N4','N5','NV1','NV2','NV3','D1','D2','D3','D4','D5','D6','J1','J2','J3'];

    const nameSelect = document.getElementById('nameSelect');
    const startDateEl = document.getElementById('startDate');
    const endDateEl = document.getElementById('endDate');
    const toolsGrid = document.getElementById('toolsGrid');
    const boardBody = document.getElementById('boardBody');
    const logList = document.getElementById('logList');
    const reserveBtn = document.getElementById('reserveBtn');
    const cancelRangeBtn = document.getElementById('cancelRangeBtn');
    const cancelAllBtn = document.getElementById('cancelAllBtn');
    const summaryName = document.getElementById('summaryName');
    const summaryRange = document.getElementById('summaryRange');
    const summaryTools = document.getElementById('summaryTools');
    const toast = document.getElementById('toast');

    let reservations = [];
    let logs = [];
    let myName = '';
    let myTools = [];

    function todayStr() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => {
        toast.classList.remove('show');
      }, 2200);
    }

    function escapeHtml(text) {
      return String(text ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function rangesOverlap(startA, endA, startB, endB) {
      return startA <= endB && endA >= startB;
    }

    function jsonpRequest(url) {
  return new Promise((resolve, reject) => {
    const callbackName = '__jsonp_cb_' + Date.now() + '_' + Math.floor(Math.random() * 10000);
    const script = document.createElement('script');

    const timer = setTimeout(() => {
      cleanup();
      reject(new Error('JSONP timeout'));
    }, 10000);

    function cleanup() {
      clearTimeout(timer);
      if (script.parentNode) script.parentNode.removeChild(script);
      delete window[callbackName];
    }

    window[callbackName] = function(data) {
      cleanup();
      resolve(data);
    };

    script.onerror = function() {
      cleanup();
      reject(new Error('JSONP load failed'));
    };

    const sep = url.includes('?') ? '&' : '?';
    script.src = `${url}${sep}callback=${callbackName}`;
    document.body.appendChild(script);
  });
}

    function isRangeValid() {
      const start = startDateEl.value;
      const end = endDateEl.value;
      return !!start && !!end && start <= end;
    }

    function getBusyToolsMap() {
      const map = new Map();
      if (!isRangeValid()) return map;

      const start = startDateEl.value;
      const end = endDateEl.value;

      reservations
        .filter(item => (item.status || '예약') !== '취소')
        .filter(item => rangesOverlap(start, end, item.startDate, item.endDate))
        .forEach(item => {
          (item.tools || []).forEach(tool => {
            if (!map.has(tool)) map.set(tool, []);
            map.get(tool).push(item);
          });
        });

      return map;
    }

    function syncSelectedMyReservations() {
      if (!myName || !isRangeValid()) {
        myTools = [];
        return;
      }

      const start = startDateEl.value;
      const end = endDateEl.value;

      const mine = reservations.find(item =>
        item.name === myName &&
        item.startDate === start &&
        item.endDate === end &&
        (item.status || '예약') !== '취소'
      );

      myTools = mine ? [...(mine.tools || [])] : [];
    }

    function renderSelectionSummary() {
      summaryName.textContent = `선택자: ${myName || '-'}`;
      summaryRange.textContent = `기간: ${startDateEl.value || '-'} ~ ${endDateEl.value || '-'}`;

      if (!myTools.length) {
        summaryTools.innerHTML = '<span class="empty">선택된 툴 없음</span>';
        return;
      }

      summaryTools.innerHTML = myTools
        .map(tool => `<span class="chip">${escapeHtml(tool)}</span>`)
        .join('');
    }

    function renderTools() {
      const busyMap = getBusyToolsMap();

      toolsGrid.innerHTML = TOOLS.map(tool => {
        const bookings = busyMap.get(tool) || [];
        const mine = bookings.some(item => item.name === myName);
        const busy = bookings.length > 0 && !mine;
        const selected = myTools.includes(tool);

        let cls = 'tool-btn';
        if (selected) cls += ' selected';
        else if (mine) cls += ' mine';
        else if (busy) cls += ' busy';

        return `
          <button type="button" class="${cls}" data-tool="${escapeHtml(tool)}" ${busy ? 'disabled' : ''}>
            ${escapeHtml(tool)}
          </button>
        `;
      }).join('');

      toolsGrid.querySelectorAll('.tool-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const tool = btn.dataset.tool;
          if (!tool) return;

          if (myTools.includes(tool)) myTools = myTools.filter(v => v !== tool);
          else myTools = [...myTools, tool];

          renderTools();
          renderSelectionSummary();
        });
      });
    }

    function renderBoard() {
      const today = todayStr();

      const rows = MEMBERS.map(member => {
        const items = reservations.filter(item =>
          item.name === member &&
          (item.status || '예약') !== '취소' &&
          rangesOverlap(today, today, item.startDate, item.endDate)
        );

        if (!items.length) {
          return '';
        }

        return `
          <tr>
            <td class="member-name">${escapeHtml(member)}</td>
            <td>
              <div class="tool-list" style="display:flex;flex-direction:column;gap:8px;">
                ${items.map(item => {
                  const cls = member === myName ? 'tool-tag mine' : 'tool-tag busy';
                  const tools = [...new Set(item.tools || [])];
                  return `
                    <div>
                      <div style="margin-bottom:4px;">
                        ${tools.map(tool => `<span class="${cls}">${escapeHtml(tool)}</span>`).join('')}
                      </div>
                      <div style="font-size:12px;color:#777;">
                        ${escapeHtml(item.startDate || '-') } ~ ${escapeHtml(item.endDate || '-')}
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            </td>
          </tr>
        `;
      }).join('');

      boardBody.innerHTML = rows || `
        <tr>
          <td colspan="2"><span class="empty">오늘 사용 중인 툴 없음</span></td>
        </tr>
      `;
    }
    async function loadReservations() {
      try {
        const data = await jsonpRequest(`${GAS_URL}?action=getReservations&_ts=${Date.now()}`);

        reservations = (Array.isArray(data?.reservations) ? data.reservations : []).map(item => ({
          timestamp: item.timestamp || '',
          name: item.name || '',
          tools: Array.isArray(item.tools)
            ? item.tools
            : String(item.tools || '').split(',').map(v => v.trim()).filter(Boolean),
          startDate: item.startDate || '',
          endDate: item.endDate || '',
          type: item.type || '예약',
          status: item.status || '예약'
        })).filter(item => item.name);
      } catch (error) {
        console.error('loadReservations error:', error);
        reservations = [];
        showToast('예약 데이터를 불러오지 못했습니다.');
      }

      syncSelectedMyReservations();
      renderTools();
      renderBoard();
      renderSelectionSummary();
    }

    async function loadLog() {
      try {
        const data = await jsonpRequest(`${GAS_URL}?action=log&_ts=${Date.now()}`);
        logs = Array.isArray(data.logs) ? data.logs : [];
      } catch (error) {
        console.error('loadLog error:', error);
        logs = [];
      }

      if (!logs.length) {
        logList.innerHTML = '<div class="empty">로그가 없습니다.</div>';
        return;
      }

      logList.innerHTML = logs.slice(0, 20).map(row => `
        <div class="log-item">
          <div class="log-top">
            <div class="log-name">${escapeHtml(row[1] || '-')}</div>
            <div class="log-time">${escapeHtml(row[0] || '-')}</div>
          </div>
          <div class="log-meta">툴: ${escapeHtml(row[2] || '-')}</div>
          <div class="log-meta">구분: ${escapeHtml(row[3] || '-')}</div>
          <div class="log-meta">기간: ${escapeHtml(row[4] || '-')} ~ ${escapeHtml(row[5] || '-')}</div>
        </div>
      `).join('');
    }

    function submitToGasByForm(payload) {
      return new Promise((resolve) => {
        const iframeName = 'gas_hidden_iframe_' + Date.now();

        const iframe = document.createElement('iframe');
        iframe.name = iframeName;
        iframe.style.display = 'none';
        document.body.appendChild(iframe);

        const form = document.createElement('form');
        form.method = 'POST';
        form.action = GAS_URL;
        form.target = iframeName;
        form.style.display = 'none';

        Object.entries(payload).forEach(([key, value]) => {
          if (Array.isArray(value)) {
            value.forEach(v => {
              const input = document.createElement('input');
              input.type = 'hidden';
              input.name = key;
              input.value = v;
              form.appendChild(input);
            });
          } else {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = key;
            input.value = value ?? '';
            form.appendChild(input);
          }
        });

        document.body.appendChild(form);
        form.submit();

        setTimeout(() => {
          form.remove();
          iframe.remove();
          resolve();
        }, 1000);
      });
    }

    async function refreshAll(delay = 1200) {
      await new Promise(resolve => setTimeout(resolve, delay));
      await loadReservations();
      await loadLog();
      syncSelectedMyReservations();
      renderTools();
      renderBoard();
      renderSelectionSummary();
    }

    async function saveReservation() {
      if (!myName) return showToast('이름을 선택하세요.');
      if (!isRangeValid()) return showToast('예약 기간을 올바르게 입력하세요.');
      if (!myTools.length) return showToast('예약할 툴을 선택하세요.');

      try {
        reserveBtn.disabled = true;

        await submitToGasByForm({
          action: 'reserve',
          name: myName,
          tools: myTools,
          startDate: startDateEl.value,
          endDate: endDateEl.value,
          type: '예약'
        });

        await refreshAll();
        showToast('예약 저장 요청을 보냈습니다.');
      } catch (error) {
        console.error(error);
        showToast('예약 저장에 실패했습니다.');
      } finally {
        reserveBtn.disabled = false;
      }
    }

    async function cancelByRange() {
      if (!myName) return showToast('이름을 선택하세요.');
      if (!isRangeValid()) return showToast('취소 기간을 확인하세요.');

      try {
        cancelRangeBtn.disabled = true;

        await submitToGasByForm({
          action: 'cancelByRange',
          name: myName,
          startDate: startDateEl.value,
          endDate: endDateEl.value,
          type: '예약구간취소'
        });

        await refreshAll();
        showToast('해당 기간 예약 취소 요청을 보냈습니다.');
      } catch (error) {
        console.error(error);
        showToast('기간 취소에 실패했습니다.');
      } finally {
        cancelRangeBtn.disabled = false;
      }
    }

    async function cancelAllByName() {
      if (!myName) return showToast('이름을 선택하세요.');
      if (!confirm(`${myName}님의 전체 예약을 취소할까요?`)) return;

      try {
        cancelAllBtn.disabled = true;

        await submitToGasByForm({
          action: 'cancelByName',
          name: myName,
          type: '예약전체취소'
        });

        await refreshAll();
        showToast('전체 예약 취소 요청을 보냈습니다.');
      } catch (error) {
        console.error(error);
        showToast('전체 취소에 실패했습니다.');
      } finally {
        cancelAllBtn.disabled = false;
      }
    }

    function initMembers() {
      nameSelect.innerHTML = `
        <option value="">이름 선택</option>
        ${MEMBERS.map(name => `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`).join('')}
      `;
    }

    function bindEvents() {
      nameSelect.addEventListener('change', () => {
        myName = nameSelect.value;
        syncSelectedMyReservations();
        renderTools();
        renderBoard();
        renderSelectionSummary();
      });

      startDateEl.addEventListener('change', () => {
        if (startDateEl.value && endDateEl.value && startDateEl.value > endDateEl.value) {
          endDateEl.value = startDateEl.value;
        }
        syncSelectedMyReservations();
        renderTools();
        renderSelectionSummary();
      });

      endDateEl.addEventListener('change', () => {
        if (startDateEl.value && endDateEl.value && startDateEl.value > endDateEl.value) {
          showToast('종료일은 시작일보다 빠를 수 없습니다.');
          endDateEl.value = startDateEl.value;
        }
        syncSelectedMyReservations();
        renderTools();
        renderSelectionSummary();
      });

      reserveBtn.addEventListener('click', saveReservation);
      cancelRangeBtn.addEventListener('click', cancelByRange);
      cancelAllBtn.addEventListener('click', cancelAllByName);
    }

    async function init() {
      initMembers();
      bindEvents();

      const today = todayStr();
      startDateEl.value = today;
      endDateEl.value = today;

      renderSelectionSummary();
      renderTools();
      await loadReservations();
      await loadLog();
    }

    init();
  </script>
</body>
</html>
